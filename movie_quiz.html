<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>武侠电影知识大考验</title>
    <style>
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background-color: #1a1a1d;
            color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM12 86c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm28-65c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm23-11c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-6 60c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zM33 53c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm54 26c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zM12 63c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm23-42c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm29 12c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm-9 29c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3z' fill='%233a3a3a' fill-opacity='0.4' fill-rule='evenodd'/%3E%3C/svg%3E");
        }

        .quiz-container {
            background-color: #2c2c34;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            border: 1px solid #444;
            width: 90%;
            max-width: 700px;
            text-align: center;
        }

        h1 {
            color: #f8b195;
            font-size: 28px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(248, 177, 149, 0.3);
        }

        .question-box {
            background-color: #383842;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #555;
        }

        #question-text {
            font-size: 18px;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .option {
            background-color: #444450;
            border: 2px solid #555;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
        }

        .option:hover {
            background-color: #505060;
            border-color: #f8b195;
            transform: translateY(-2px);
        }

        .option.selected {
            background-color: #f8b195;
            color: #2c2c34;
            border-color: #f8b195;
            font-weight: bold;
        }

        .option.correct {
            background-color: #28a745;
            border-color: #28a745;
        }

        .option.incorrect {
            background-color: #dc3545;
            border-color: #dc3545;
        }

        button {
            background-color: #f8b195;
            color: #2c2c34;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            margin-top: 10px;
        }

        button:hover {
            background-color: #f69e7b;
            box-shadow: 0 0 15px rgba(248, 177, 149, 0.4);
        }

        #feedback {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
            min-height: 25px;
        }

        #progress {
            margin-top: 15px;
            color: #aaa;
            font-size: 14px;
        }

        .final-score {
            font-size: 24px;
            color: #f8b195;
            margin: 20px 0;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>🎬 武侠电影知识大考验</h1>
    
    <div class="question-box">
        <div id="question-text"></div>
        <div class="options" id="options-container"></div>
    </div>

    <button id="next-btn" onclick="nextQuestion()">下一题</button>
    <div id="feedback"></div>
    <div id="progress">题目 1 / 10</div>

    <div class="final-score" id="final-result" style="display: none;"></div>
</div>

<script>
    // 题目数据
    const quizData = [
        {
            question: "《侠女》的导演是？",
            options: ["张艺谋", "胡金铨", "侯孝贤", "陈凯歌"],
            answer: 1
        },
        {
            question: "《英雄》中，无名用的主要兵器是？",
            options: ["剑", "刀", "枪", "弓"],
            answer: 0
        },
        {
            question: "《刺客聂隐娘》的导演是？",
            options: ["胡金铨", "张艺谋", "侯孝贤", "李安"],
            answer: 2
        },
        {
            question: "哪部电影取材自唐代裴铏的传奇小说《聂隐娘》？",
            options: ["《侠女》", "《英雄》", "《刺客聂隐娘》", "都不是"],
            answer: 2
        },
        {
            question: "《侠女》在哪届戛纳电影节获得重要奖项？",
            options: ["1980", "1975", "1990", "2000"],
            answer: 1
        },
        {
            question: "《英雄》里，不同颜色代表不同的叙事版本，不包括以下哪种颜色？",
            options: ["红", "蓝", "绿", "紫"],
            answer: 3
        },
        {
            question: "《刺客聂隐娘》的故事背景朝代是？",
            options: ["宋", "唐", "明", "清"],
            answer: 1
        },
        {
            question: "下列哪部被公认为新武侠电影开山之作之一？",
            options: ["《英雄》", "《刺客聂隐娘》", "《侠女》", "都不是"],
            answer: 2
        },
        {
            question: "《英雄》中，残剑与飞雪的关系是？",
            options: ["师徒", "兄妹", "恋人", "敌人"],
            answer: 2
        },
        {
            question: "三部影片中，风格最接近古典山水画、长镜头美学的是？",
            options: ["《侠女》", "《英雄》", "《刺客聂隐娘》", "都一样"],
            answer: 2
        }
    ];

    let currentQuestion = 0;
    let score = 0;
    let selectedOptionIndex = -1;

    // DOM 元素
    const questionText = document.getElementById('question-text');
    const optionsContainer = document.getElementById('options-container');
    const nextBtn = document.getElementById('next-btn');
    const feedback = document.getElementById('feedback');
    const progress = document.getElementById('progress');
    const finalResult = document.getElementById('final-result');

    // 初始化游戏
    function initQuiz() {
        currentQuestion = 0;
        score = 0;
        loadQuestion();
    }

    // 加载当前题目
    function loadQuestion() {
        // 重置界面
        selectedOptionIndex = -1;
        feedback.textContent = '';
        nextBtn.disabled = true;
        optionsContainer.innerHTML = '';

        // 更新进度
        progress.textContent = `题目 ${currentQuestion + 1} / ${quizData.length}`;

        // 获取当前题目
        const currentQuiz = quizData[currentQuestion];
        questionText.textContent = currentQuiz.question;

        // 创建选项
        currentQuiz.options.forEach((option, index) => {
            const optionElement = document.createElement('div');
            optionElement.className = 'option';
            optionElement.textContent = option;
            optionElement.onclick = () => selectOption(index, optionElement);
            optionsContainer.appendChild(optionElement);
        });

        // 如果是最后一题，修改按钮文字
        if (currentQuestion === quizData.length - 1) {
            nextBtn.textContent = '查看结果';
        } else {
            nextBtn.textContent = '下一题';
        }
    }

    // 选择选项
    function selectOption(index, element) {
        // 移除之前的选中状态
        const allOptions = document.querySelectorAll('.option');
        allOptions.forEach(opt => opt.classList.remove('selected'));

        // 设置当前选中
        selectedOptionIndex = index;
        element.classList.add('selected');
    }

    // 验证答案并显示结果
    function checkAnswer() {
        if (selectedOptionIndex === -1) return;

        const currentQuiz = quizData[currentQuestion];
        const allOptions = document.querySelectorAll('.option');

        // 禁用点击
        allOptions.forEach(opt => opt.style.pointerEvents = 'none');
        nextBtn.disabled = false;

        // 验证
        if (selectedOptionIndex === currentQuiz.answer) {
            score++;
            feedback.textContent = '🎉 回答正确！';
            feedback.style.color = '#28a745';
            allOptions[selectedOptionIndex].classList.add('correct');
        } else {
            feedback.textContent = '❌ 回答错误，正确答案已标绿。';
            feedback.style.color = '#dc3545';
            allOptions[selectedOptionIndex].classList.add('incorrect');
            allOptions[currentQuiz.answer].classList.add('correct');
        }
    }

    // 下一题逻辑
    function nextQuestion() {
        if (selectedOptionIndex === -1) return;

        checkAnswer();

        // 如果不是最后一题，继续加载
        if (currentQuestion < quizData.length - 1) {
            currentQuestion++;
            setTimeout(loadQuestion, 500);
        } else {
            // 游戏结束，显示最终得分
            setTimeout(() => {
                showFinalResult();
            }, 500);
        }
    }

    // 显示最终结果
    function showFinalResult() {
        document.querySelector('.quiz-container').style.display = 'none';
        
        const finalScreen = document.createElement('div');
        finalScreen.className = 'quiz-container';
        finalScreen.innerHTML = `
            <h1>🏆 挑战结束！</h1>
            <div class="final-score">你的得分：${score} / ${quizData.length}</div>
            <p>感谢参与武侠电影知识大考验！</p >
            <button onclick="location.reload()">重新开始</button>
        `;
        document.body.appendChild(finalScreen);
    }

    // 开始游戏
    initQuiz();
</script>

</body>
</html>
